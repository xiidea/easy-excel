name: Publish PHP Package

on:
  push:
    branches:
      - main
    paths:
      - 'php/**'
      - '.github/workflows/publish-php.yml'

jobs:
  split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Split php subtree
        run: |
          git subtree split --prefix=php -b php-split

      - name: Push to easy-excel-php
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          git remote add target \
            https://x-access-token:${PUSH_TOKEN}@github.com/xiidea/easy-excel-php.git

          git push target php-split:main --force
